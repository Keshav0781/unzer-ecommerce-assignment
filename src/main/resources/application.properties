spring.application.name=ecommerce-shop
spring.datasource.url=jdbc:postgresql://localhost:5432/unzer_shop
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:localdev}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
unzer.payment-gateway=mock
unzer.api-key=
unzer.return-url=https://your-app.example.com/checkout/return
unzer.reconciliation.stale-threshold-minutes=10
unzer.reconciliation.interval-ms=60000